name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (vitest)
        run: npm test

      - name: Build (vite)
        run: npm run build

      - name: Sanity check — dist/ non-empty
        run: |
          test -f dist/manifest.json
          test -d dist/assets
          echo "dist OK:"
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extractor-hcd-dist-${{ github.sha }}
          path: dist/
          retention-days: 14
